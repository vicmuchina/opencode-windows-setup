<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lessons - [Device Name]</title>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-orange: #d29922;
            --border: #30363d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 40px 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header { margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 30px; }

        .breadcrumb { color: var(--text-secondary); font-size: 0.9em; margin-bottom: 15px; }
        .breadcrumb a { color: var(--accent-blue); text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }

        h1 { font-size: 2em; margin-bottom: 10px; color: var(--text-primary); }
        .device-info { color: var(--text-secondary); font-size: 1.1em; }

        .notice {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-left: 4px solid var(--accent-blue);
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 40px;
        }
        .notice strong { color: var(--accent-blue); }

        .lessons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .lesson-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 25px;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            display: block;
        }
        .lesson-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            border-color: var(--accent-blue);
        }

        .lesson-number {
            display: inline-block;
            background: var(--accent-blue);
            color: #ffffff;
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .lesson-card h2 { color: var(--text-primary); font-size: 1.3em; margin-bottom: 12px; }
        .lesson-card p { color: var(--text-secondary); font-size: 0.95em; margin-bottom: 20px; }

        .lesson-meta { background: var(--bg-tertiary); padding: 15px; border-radius: 6px; font-size: 0.85em; }
        .lesson-meta div { margin-bottom: 6px; color: var(--text-secondary); }
        .lesson-meta strong { color: var(--text-primary); }

        .tags { margin-top: 15px; display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { background: var(--bg-tertiary); color: var(--text-secondary); padding: 5px 12px; border-radius: 12px; font-size: 0.8em; }

        .footer-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 30px;
            margin-top: 40px;
        }
        .footer-section h3 { color: var(--text-primary); margin-bottom: 20px; }

        .progress-bar { background: var(--bg-tertiary); border-radius: 6px; height: 8px; margin: 20px 0; overflow: hidden; }
        .progress-fill { background: var(--accent-green); height: 100%; width: 0%; border-radius: 6px; transition: width 0.3s; }

        .download-btn {
            display: inline-block;
            background: var(--accent-green);
            color: #ffffff;
            padding: 12px 30px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 20px;
            transition: background 0.2s;
        }
        .download-btn:hover { background: #2ea043; }

        .back-link { display: inline-block; margin-bottom: 20px; color: var(--accent-blue); text-decoration: none; }
        .back-link:hover { text-decoration: underline; }

        @media (max-width: 768px) {
            body { padding: 20px 10px; }
            .lessons-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1.6em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../../index.html" class="back-link">← Back to All Devices</a>
        <header>
            <h1>[Device Name] Lessons</h1>
            <div class="device-info">Board: [Board Model]</div>
        </header>
        <div class="notice">
            <strong>📖 How to Use:</strong>
            Open your schematic PDF to the referenced pages as you read each lesson.
        </div>
        <div class="lessons-grid">
            <!-- LESSON_CARDS -->
        </div>
        <div class="footer-section">
            <h3>📊 Device Progress</h3>
            <div class="progress-bar"><div class="progress-fill"></div></div>
            <p style="color: var(--text-secondary);">
                <strong style="color: var(--text-primary);">Lessons Completed:</strong> 0 / 0
            </p>
            <div style="margin-top: 25px; padding-top: 25px; border-top: 1px solid var(--border);">
                <a href="output/journal.pdf" class="download-btn">📥 Download PDF</a>
            </div>
        </div>
    </div>
    <script>setTimeout(() => location.reload(), 300000);</script>
</body>
</html>
